    <!-- ═══ 캐시 버스팅 & 자동 업데이트 감지 ═══ -->
    <script>
    (function() {
        var CHECK_INTERVAL = 2 * 60 * 1000; // 2분마다 체크 (기존 5분 → 2분)
        var _lastChecked = 0;

        function checkVersion(force) {
            var now = Date.now();
            // 10초 이내 중복 호출 방지
            if (!force && now - _lastChecked < 10000) return;
            _lastChecked = now;

            fetch('./version.json?_=' + now, {
                cache: 'no-store',
                headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
            })
            .then(function(r) {
                if (!r.ok) throw new Error('fetch fail');
                return r.json();
            })
            .then(function(data) {
                var stored = sessionStorage.getItem('_app_version');
                if (!stored) {
                    sessionStorage.setItem('_app_version', data.version);
                } else if (stored !== data.version) {
                    sessionStorage.setItem('_app_version', data.version);
                    var banner = document.getElementById('_update_banner');
                    if (banner) banner.style.display = 'flex';
                }
            })
            .catch(function() { /* 로컬/오프라인 무시 */ });
        }

        window.addEventListener('load', function() {
            // 로드 직후 1초 뒤 첫 체크
            setTimeout(function(){ checkVersion(true); }, 1000);
            setInterval(function(){ checkVersion(false); }, CHECK_INTERVAL);
        });

        // 탭 전환 복귀 시 즉시 체크 (오래 열어둔 탭 대응)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') checkVersion(true);
        });

        // 창 포커스 복귀 시도 즉시 체크
        window.addEventListener('focus', function() { checkVersion(true); });
    })();
    </script>

            // 간단한 32bit 해시 (xorshift)
            let h = 0;
            for(let i=0;i<seed.length;i++){
                h = Math.imul(31, h) + seed.charCodeAt(i) | 0;
            }
            h ^= h >>> 16; h = Math.imul(h, 0x45d9f3b); h ^= h >>> 16;
            return (h >>> 0) / 4294967296;
        }

        function renderScoreCard(score) {

                function parseFortune_Zodiac(raw) {
            const m = raw.match(/<div[^>]*class="fc-text"[^>]*>([\s\S]*?)<\/div>/);
            if (!m) return null;
            return m[1]
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]+>/g, '')
                .replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').trim();
        }

        // ── 타입 2: 띠 오늘운세 ──
        // 제목: "돼지띠 2026년 03월 19일 오늘의 띠운세"
        // HTML: <div class="card"><span class="badge">...출생연도별...</span>
        //         <div style="margin-top:8px">{year_rows}</div></div>
        // year_rows 각 행: <div style="font-size:11px;color:#888">🎨 색 숫자</div> 제거
        function parseFortune_Chinese(raw) {
            // badge에 "출생연도별" 포함된 .card 안의
            // <div style="margin-top:8px">{year_rows 6개}</div> 전체를 깊이 추적으로 추출
            const OPEN_TAG = '<div style="margin-top:8px">';
            const badgePos = raw.indexOf('출생연도별');
            if (badgePos === -1) return null;
            const wrapPos = raw.indexOf(OPEN_TAG, badgePos);
            if (wrapPos === -1) return null;

            const contentStart = wrapPos + OPEN_TAG.length;
            let depth = 1, i = contentStart, contentEnd = -1;
            while (i < raw.length && depth > 0) {
                const o = raw.indexOf('<div', i);
                const c = raw.indexOf('</div>', i);
                if (o !== -1 && (c === -1 || o < c)) {
                    depth++;
                    i = o + 4;
                } else if (c !== -1) {
                    depth--;
                    if (depth === 0) { contentEnd = c; break; }
                    i = c + 6;
                } else { break; }
            }
            if (contentEnd === -1) return null;

            // 행운의 색/숫자 줄(<div style="font-size:11px;color:#888">) 제거
            return raw.slice(contentStart, contentEnd)
                .replace(/<div[^>]*font-size:11px;color:#888[^>]*>[\s\S]*?<\/div>/g, '');
        }

        // ── 타입 3: 별자리 주간운세 ──
        // 제목: "양자리 2026년 03월 주간운세 03/17 ~ 03/23"
        // HTML: <div class="card"><span class="badge">...</span><p style="line-height:1.9">{본문}</p>...
        function parseFortune_Weekly(raw) {
            // 첫 번째 .card 안의 모든 <p> 태그 전체 수집 (기존: 첫 p만 가져오던 버그 수정)
            const cardM = raw.match(/<div[^>]*class="card"[^>]*>([\s\S]*?)<\/div>\s*(?:<div|$)/);
            const scope = cardM ? cardM[1] : raw;
            const parts = [...scope.matchAll(/<p[^>]*>([\s\S]*?)<\/p>/g)]
                .map(m => m[1].replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim())
                .filter(Boolean);
            if (!parts.length) return null;
            return parts.join('\n\n');
        }

        // ── 타입 4: 띠 월간운세 ──
        // 제목: "쥐띠 2026년 03월 월간운세"
        // HTML: <div class="card"><p>{본문1}</p><br><p>{본문2}</p>
        //         <div class="week-day"><strong>상순...</strong><br>내용</div>...
        function parseFortune_Monthly(raw) {
            // 키워드 card 전까지만 (두 번째 card = 관련 키워드 섹션)
            const cardM = raw.match(
                /<div[^>]*class="card"[^>]*>([\s\S]*?)<\/div>\s*<div[^>]*class="card"[^>]*><span[^>]*class="badge"[^>]*>🔍/
            );
            if (!cardM) return null;
            const inner = cardM[1];
            const ps = [...inner.matchAll(/<p[^>]*>([\s\S]*?)<\/p>/g)]
                .map(m2 => m2[1].replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').trim())
                .filter(Boolean);
            const wds = [...inner.matchAll(/<div[^>]*class="week-day"[^>]*>([\s\S]*?)<\/div>/g)]
                .map(m2 => m2[1].replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').trim())
                .filter(Boolean);
            return { ps, wds };
        }

        // ── 통합 파서: 제목으로 타입 판별 후 파싱 ──
        function extractBlogContent(post) {
            if (!post) return null;
            const raw  = post.content || '';
            const meta = { title: post.title, url: post.url, published: post.published };
            const t    = post.title || '';

            if (t.includes('오늘의 운세') && !t.includes('띠운세')) {
                const text = parseFortune_Zodiac(raw);
                if (!text) return null;
                const score = parseFortune_Score(raw);
                return { ...meta, type: 'zodiac', text, score };
            }
            if (t.includes('띠운세') && t.includes('월') && t.includes('일')) {
                const html = parseFortune_Chinese(raw);
                if (!html) return null;
                const score = parseFortune_Score(raw);
                return { ...meta, type: 'chinese', yearRowsHTML: html, score };
            }
            if (t.includes('주간운세')) {
                const text = parseFortune_Weekly(raw);
                return text ? { ...meta, type: 'weekly', text } : null;
            }
            if (t.includes('월간운세')) {
                const data = parseFortune_Monthly(raw);
                return data ? { ...meta, type: 'monthly', ...data } : null;
            }
            // 폴백: fc-text → card p 순
            const ft = parseFortune_Zodiac(raw);
            if (ft) return { ...meta, type: 'zodiac', text: ft };
            const wt = parseFortune_Weekly(raw);
            if (wt) return { ...meta, type: 'weekly', text: wt };
            return null;
        }

        // ── KST 날짜 포맷 헬퍼 ──
        function kstYear()  { return kstNow().getUTCFullYear(); }
        function kstMonth() { return String(kstNow().getUTCMonth()+1).padStart(2,'0'); }
        function kstDay()   { return String(kstNow().getUTCDate()).padStart(2,'0'); }
        function kstWeekNum() {
            const d = kstNow();
            const mon = new Date(d);
            mon.setUTCDate(d.getUTCDate() - d.getUTCDay() + 1);
            return String(mon.getUTCMonth()+1).padStart(2,'0') + String(mon.getUTCDate()).padStart(2,'0');
        }
        // 이번 주 월요일의 연도/월 반환 (주간운세 포스트 제목 매칭용)
        // create_post.py는 월요일에 발행하므로 포스트 제목의 "XX년 YY월"은
        // 이번 주 월요일 기준이다. 현재 날짜가 화~일이어도 월요일 월을 써야 매칭됨.
        function kstWeekMondayYear() {
            const d = kstNow();
            const mon = new Date(d);
            mon.setUTCDate(d.getUTCDate() - d.getUTCDay() + 1);
            return mon.getUTCFullYear();
        }
        function kstWeekMondayMonth() {
            const d = kstNow();
            const mon = new Date(d);
            mon.setUTCDate(d.getUTCDate() - d.getUTCDay() + 1);
            return String(mon.getUTCMonth()+1).padStart(2,'0');
        }

        async function fetchByLabelAndTitle(label, keywords) {
            const url = BASE_URL + '/blogs/' + BLOG_ID + '/posts?key=' + API_KEY
                + '&labels=' + encodeURIComponent(label)
                + '&maxResults=40&orderBy=updated'
                + '&fields=items(title,url,published,content)';
            try {
                const r = await fetch(url, {cache: 'no-store'});
                const d = await r.json();
                return (d.items||[]).find(p => keywords.every(k => p.title.includes(k))) || null;
            } catch(e) { return null; }
        }

        // 개별 부적 저장
        function saveOneBujeok(elId, label) {
            // svg- prefix 로 SVG 래퍼만 캡처 (버튼/라벨 제외)
            const svgEl = document.getElementById('svg-' + elId);
            const el    = svgEl || document.getElementById(elId);
            if(!el){ alert('저장할 부적이 없습니다'); return; }
            const rect = el.getBoundingClientRect();
            html2canvas(el, {
                scale: 4,
                backgroundColor: null,
                useCORS: true,
                logging: false,
                removeContainer: true,
                x: 0,
                y: 0,
                scrollX: 0,
                scrollY: 0,
                width: rect.width,
                height: rect.height,
                windowWidth: rect.width,
                windowHeight: rect.height
            }).then(canvas=>{
                // 실제 콘텐츠 영역만 크롭 (여백 제거)
                const ctx = canvas.getContext('2d');
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                let top = canvas.height, bottom = 0, left = canvas.width, right = 0;
                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const alpha = data[(y * canvas.width + x) * 4 + 3];
                        if (alpha > 10) {
                            if (y < top) top = y;
                            if (y > bottom) bottom = y;
                            if (x < left) left = x;
                            if (x > right) right = x;
                        }
                    }
                }
                const pad = 8;
                top    = Math.max(0, top - pad);
                bottom = Math.min(canvas.height - 1, bottom + pad);
                left   = Math.max(0, left - pad);
                right  = Math.min(canvas.width - 1, right + pad);
                const cropW = right - left + 1;
                const cropH = bottom - top + 1;
                const out = document.createElement('canvas');
                out.width  = cropW;
                out.height = cropH;
                out.getContext('2d').drawImage(canvas, left, top, cropW, cropH, 0, 0, cropW, cropH);
                const a = document.createElement('a');
                a.download = label + '.png';
                a.href = out.toDataURL('image/png');
                a.click();
            });
        }

        // 폰 배경 저장 (9:16, 1080x1920)
        function saveBujeokWallpaper(elId, label) {
            const svgEl = document.getElementById('svg-' + elId);
            const el    = svgEl || document.getElementById(elId);
            if(!el){ alert('저장할 부적이 없습니다'); return; }
            const rect2=el.getBoundingClientRect();html2canvas(el,{scale:4,backgroundColor:null,useCORS:true,logging:false,x:0,y:0,scrollX:0,scrollY:0,width:rect2.width,height:rect2.height,windowWidth:rect2.width,windowHeight:rect2.height}).then(rawCanvas=>{const ri=rawCanvas.getContext('2d').getImageData(0,0,rawCanvas.width,rawCanvas.height).data;let rt=rawCanvas.height,rb=0,rl=rawCanvas.width,rr=0;for(let y=0;y<rawCanvas.height;y++)for(let x=0;x<rawCanvas.width;x++){if(ri[(y*rawCanvas.width+x)*4+3]>10){if(y<rt)rt=y;if(y>rb)rb=y;if(x<rl)rl=x;if(x>rr)rr=x;}}const rp=4,rw=Math.max(1,rr-rl+1+rp*2),rh=Math.max(1,rb-rt+1+rp*2);const srcCanvas=document.createElement('canvas');srcCanvas.width=rw;srcCanvas.height=rh;srcCanvas.getContext('2d').drawImage(rawCanvas,Math.max(0,rl-rp),Math.max(0,rt-rp),rw,rh,0,0,rw,rh);
                const W = 1080, H = 1920;
                const dst = document.createElement('canvas');
                dst.width = W; dst.height = H;
                const ctx = dst.getContext('2d');
                const grd = ctx.createLinearGradient(0, 0, W, H);
                grd.addColorStop(0, '#1a0a00');
                grd.addColorStop(0.5, '#3b1700');
                grd.addColorStop(1, '#1a0a00');
                ctx.fillStyle = grd;
                ctx.fillRect(0, 0, W, H);
                ctx.strokeStyle = '#d97706';
                ctx.lineWidth = 12;
                ctx.strokeRect(30, 30, W-60, H-60);
                ctx.strokeStyle = '#fde68a';
                ctx.lineWidth = 3;
                ctx.strokeRect(44, 44, W-88, H-88);
                ctx.fillStyle = '#fde68a';
                ctx.font = 'bold 52px serif';
                ctx.textAlign = 'center';
                ctx.fillText('🔯 사주 맞춤 부적', W/2, 130);
                ctx.font = '34px serif';
                ctx.fillStyle = '#fef3c7';
                ctx.fillText(label, W/2, 185);
                const ratio = srcCanvas.width / srcCanvas.height;
                const imgW = Math.min(W - 160, 800);
                const imgH = imgW / ratio;
                const imgX = (W - imgW) / 2;
                const imgY = (H - imgH) / 2;
                ctx.save();
                ctx.shadowColor = '#d97706';
                ctx.shadowBlur = 40;
                ctx.drawImage(srcCanvas, imgX, imgY, imgW, imgH);
                ctx.restore();
                ctx.fillStyle = '#92400e';
                ctx.font = '28px serif';
                ctx.fillStyle = '#fde68a';
                ctx.font = '24px serif';
                ctx.fillText('행운이 함께하길 기원합니다 ✨', W/2, H - 45);
                const a = document.createElement('a');
                a.download = label + '_폰배경.png';
                a.href = dst.toDataURL('image/png');
                a.click();
            });
        }

        function saveCard(elId, filename){
            const el = document.getElementById(elId);
            if(!el){ alert('저장할 카드가 없습니다'); return; }
            const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            html2canvas(el, {scale:2, backgroundColor:'#ffffff', useCORS:true, logging:false}).then(canvas=>{
                if(isIOS && navigator.share && navigator.canShare){
                    canvas.toBlob(function(blob){
                        const file = new File([blob], filename+'.png', {type:'image/png'});
                        if(navigator.canShare({files:[file]})){
                            navigator.share({files:[file], title:filename})
                            .catch(function(e){ if(e.name!=='AbortError') _fallbackSave(canvas,filename); });
                        } else { _fallbackSave(canvas,filename); }
                    },'image/png');
                    return;
                }
                _fallbackSave(canvas, filename);
            }).catch(function(){ alert('저장 실패. 스크린샷을 이용해주세요.'); });
        }
        function _fallbackSave(canvas, filename){
            canvas.toBlob(function(blob){
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename+'.png';
                document.body.appendChild(a); a.click();
                setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); }, 300);
            },'image/png');
        }

            const m = month + 12 * a - 3;
            const jdn = day + Math.floor((153*m+2)/5) + 365*y
                + Math.floor(y/4) - Math.floor(y/100) + Math.floor(y/400) - 32045;
            const base = 2451545; // 2000-01-01 JDN (갑진일 → cg=0,jj=4)
            const diff = jdn - base;
            const cg = ((diff % 10) + 10) % 10;
            const jj = ((diff % 12) + 12) % 12;
            return {cg, jj};
        }

        // 시주 — 시간(0~23)으로 지지 인덱스
        function hourToJJ(hour) {
            if (hour >= 23 || hour < 1) return 0;  // 자시
            return Math.floor((hour + 1) / 2);
        }
        // 시간 천간 = (일간×2 + 시지) % 10 (야자시 포함 간소화)
        function hourCG(dayCG, hourJJ) { return (dayCG * 2 + hourJJ) % 10; }

        // 편관 카운트
        function countPyeongwan(pillars, ilgan_idx) {
            let cnt = 0;
            pillars.forEach(p => {
                if (p.cg !== undefined && p.cg !== ilgan_idx) {
                    if (getSipsin(ilgan_idx, p.cg) === '편관') cnt++;
                }
            });
            return cnt;
        }

        // 시간 문자열 → 시(hour) 정수
        function parseHour(timeStr) {
            if (!timeStr || timeStr === 'unknown') return null;
            // 공백 제거 후 처리
            const s = timeStr.trim().replace(/\s+/g, '');

            // HH:MM (공백 제거 후 → "17:50")
            if (/^\d{1,2}:\d{2}$/.test(s)) {
                const h = parseInt(s.split(':')[0]);
                return (h >= 0 && h <= 23) ? h : null;
            }
            // "17시50분" / "17시"
            const mSi = s.match(/^(\d{1,2})시/);
            if (mSi) {
                const h = parseInt(mSi[1]);
                return (h >= 0 && h <= 23) ? h : null;
            }
            // 숫자만 3~4자리 (HHMM)
            if (/^\d{3,4}$/.test(s)) {
                const h = parseInt(s.length === 3 ? s[0] : s.slice(0,2));
                return (h >= 0 && h <= 23) ? h : null;
            }
            // 숫자만 1~2자리
            if (/^\d{1,2}$/.test(s)) {
                const h = parseInt(s);
                return (h >= 0 && h <= 23) ? h : null;
            }
            return null;
        }

        async function tjAiAssist(monthIdx, bYear, bMonth, bDay, ilgan, age, gender) {
            var container = document.getElementById('tj-ai-' + monthIdx);
            if (!container) return;
            if (container.dataset.loaded === '1') {
                container.style.display = container.style.display === 'none' ? 'block' : 'none';
                return;
            }
            container.style.display = 'block';
            container.innerHTML = '<div style="text-align:center;padding:12px;color:#7c3aed;font-size:13px">✨ AI 해석 생성 중...</div>';

            var monthName = TJ_MONTH_NAME[monthIdx];
            var icon = TJ_MONTH_ICON[monthIdx];
            var cgIdx = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'].indexOf(ilgan);
            var ohaeng = cgIdx > -1 ? ['木','木','火','火','土','土','金','金','水','水'][cgIdx] : '土';
            var ohaengKr = {'木':'목(木)','火':'화(火)','土':'토(土)','金':'금(金)','水':'수(水)'}[ohaeng] || '토(土)';

            var prompt = '사주 기반 토정비결 ' + monthName + ' AI 보조 해석을 작성해주세요.\n\n'
                + '[ 입력 정보 ]\n'
                + '- 생년월일: ' + bYear + '년 ' + bMonth + '월 ' + bDay + '일\n'
                + '- 일간(日干): ' + ilgan + ' (' + ohaengKr + ' 오행)\n'
                + '- 나이: 만 ' + age + '세 / 성별: ' + gender + '\n'
                + '- 대상 월: ' + monthName + '\n\n'
                + '아래 세 항목을 각각 한 문장(30자 내외)으로 간결하고 따뜻하게 작성하세요. '
                + '전통 사주·토정비결 어투를 가미하되 현대적으로 읽히게 해주세요.\n\n'

                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 300,

                    })

                var data = await resp.json();

        // 음력 → 양력 변환
        function lunarToSolar(lunarYear, lunarMonth, lunarDay) {
            const data = LUNAR_DATA[lunarYear];
            if (!data) return null;
            const [startMonth, startDay, months] = data;
            // 음력 1월 1일의 양력 날짜 (해당 연도)
            let solarDate = new Date(lunarYear, startMonth - 1, startDay);
            // 해당 월까지 일수 누적
            for (let m = 1; m < lunarMonth; m++) {
                solarDate.setDate(solarDate.getDate() + (months[m - 1] || 30));
            }
            solarDate.setDate(solarDate.getDate() + lunarDay - 1);
            return {
                year: solarDate.getFullYear(),
                month: solarDate.getMonth() + 1,
                day: solarDate.getDate()
            };
        }

        function solarToLunar(solarYear, solarMonth, solarDay) {
            const data = LUNAR_DATA[solarYear];
            if (!data) return { year: solarYear, month: solarMonth, day: solarDay, lunar: false };
            const [startMonth, startDay, months] = data;
            const lunarStart = new Date(solarYear, startMonth - 1, startDay);
            const target = new Date(solarYear, solarMonth - 1, solarDay);
            let diff = Math.floor((target - lunarStart) / 86400000);
            if (diff < 0) {
                // 전년도 데이터 필요
                const prevData = LUNAR_DATA[solarYear - 1];
                if (!prevData) return { year: solarYear, month: solarMonth, day: solarDay, lunar: false };
                const [pm, pd, pmonths] = prevData;
                const prevStart = new Date(solarYear - 1, pm - 1, pd);
                diff = Math.floor((target - prevStart) / 86400000);
                let lunarMonth = 1, lunarDay = diff + 1;
                for (let i = 0; i < pmonths.length; i++) {
                    if (lunarDay <= pmonths[i]) break;
                    lunarDay -= pmonths[i]; lunarMonth++;
                }
                return { year: solarYear - 1, month: lunarMonth, day: lunarDay, lunar: true };
            }
            let lunarMonth = 1, lunarDay = diff + 1;
            for (let i = 0; i < months.length; i++) {
                if (lunarDay <= months[i]) break;
                lunarDay -= months[i]; lunarMonth++;
            }
            return { year: solarYear, month: lunarMonth, day: lunarDay, lunar: true };
        }

        function resolveToSolar(year, month, day, calType) {
            if (calType === '음력') {
                const sol = lunarToSolar(year, month, day);
                return sol || { year, month, day };
            }
            return { year, month, day };
        }

        // 한글 한 음절 → 그 음에 해당하는 한자 후보 반환
        function getHanjaCandidates(syllable) {
            return HANJA_BY_SOUND[syllable] || [];
        }

        // ─────────────────────────────────────────
        // 바텀시트 한자 선택 UI
        // ─────────────────────────────────────────

        // 선택된 한자 배열 (글자별)
        var _selectedHanja = [];  // [{hangul, hanja, strokes}]
        var _hanjaChars      = [];   // 이름 글자 배열
        var _hanjaStep       = 0;    // 현재 글자 인덱스
        var _hanjaExpandedIdx = -1;  // 더보기 펼쳐진 인덱스 (-1=없음)

        // 바텀시트 삽입 (최초 1회)
        function _ensureBottomSheet() {
            if (document.getElementById('hanja-sheet')) return;
            var sheet = document.createElement('div');
            sheet.id = 'hanja-sheet';
            sheet.innerHTML = `

            style="flex:1;padding:14px;border-radius:14px;border:2px solid #e2e8f0;

        function openHanjaSheet(hangulName) {
            _ensureBottomSheet();
            _hanjaChars   = [...hangulName].filter(function(c){ return c.trim(); });
            _selectedHanja= _hanjaChars.map(function(c){ return {hangul:c, hanja:null, strokes:null}; });
            _hanjaStep        = 0;
            _hanjaExpandedIdx = -1;
            _renderSheetStep(_hanjaStep);

            var overlay = document.getElementById('hanja-sheet-overlay');
            var body    = document.getElementById('hanja-sheet-body');
            overlay.style.display = 'block';
            body.style.display    = 'flex';
            // 트랜지션 트리거
            requestAnimationFrame(function(){
                requestAnimationFrame(function(){
                    body.style.transform = 'translateY(0)';
                    overlay.style.opacity = '1';
                });
            });
            document.body.style.overflow = 'hidden';
        }

        function closeHanjaSheet() {
            var overlay = document.getElementById('hanja-sheet-overlay');
            var body    = document.getElementById('hanja-sheet-body');
            if (!body) return;
            body.style.transform  = 'translateY(100%)';
            overlay.style.opacity = '0';
            setTimeout(function(){
                overlay.style.display = 'none';
                body.style.display    = 'none';
                document.body.style.overflow = '';
            }, 320);
        }

        function _renderSheetStep(idx) {
            var ch         = _hanjaChars[idx];
            var candidates = getHanjaCandidates(ch);
            var total      = _hanjaChars.length;
            var selected   = _selectedHanja[idx];

            document.getElementById('hanja-sheet-title').textContent =
                '"' + ch + '" 에 해당하는 한자';
            document.getElementById('hanja-sheet-step').textContent =
                (idx + 1) + ' / ' + total + '  글자';

            // 다음/완료 버튼 텍스트
            var nextBtn = document.getElementById('hanja-next-btn');
            nextBtn.textContent = (idx === total - 1) ? '완료 ✓' : '다음 →';

            // 이전 버튼 비활성
            document.getElementById('hanja-prev-btn').style.opacity = idx === 0 ? '.35' : '1';
            document.getElementById('hanja-prev-btn').disabled = idx === 0;

            var list = document.getElementById('hanja-sheet-list');

            if (candidates.length === 0) {
                list.innerHTML = _hanjaDirectInputHTML(idx);
                return;
            }

            // 획수 기준 정렬 (7~14획 범위 우선, 벗어날수록 후순위)
            var scored = candidates.map(function(c) {
                var penalty = (c.s >= 7 && c.s <= 14) ? 0 : Math.min(Math.abs(c.s - 10), 8);
                return { cand: c, score: penalty };
            });
            scored.sort(function(a, b) { return a.score - b.score; });
            var sorted  = scored.map(function(x){ return x.cand; });

            var TOP      = 3;
            var expanded = (_hanjaExpandedIdx === idx);
            var hasMore  = sorted.length > TOP;

            // 선택된 후보가 TOP3 밖이면 자동 펼치기
            if (!expanded && selected.hanja) {
                var selInTop = sorted.slice(0, TOP).some(function(c){ return c.h === selected.hanja; });
                if (!selInTop) { _hanjaExpandedIdx = idx; expanded = true; }
            }

            var visible = expanded ? sorted : sorted.slice(0, TOP);

            var html = '<div style="font-size:11px;color:#94a3b8;margin-bottom:10px">'
                + '⭐ 획수 기준 추천 ' + Math.min(TOP, sorted.length) + '개'
                + (hasMore && !expanded ? '  ·  전체 ' + sorted.length + '개' : '')
                + '</div>';

            html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">';
            visible.forEach(function(cand, ci) {
                var oh    = hanjaToOhaeng(cand.h, cand.s);
                var bg    = OH_BG[oh];
                var tc    = OH_TEXT[oh];
                var isSel = selected.hanja === cand.h;
                var isTop1 = (ci === 0 && !expanded);
                html += '<button onclick="hanjaSheetSelect(' + idx + ',\'' + cand.h + '\',' + cand.s + ',\'' + cand.m + '\')"'
                    + ' style="display:flex;flex-direction:column;align-items:center;justify-content:center;'
                    + 'background:' + (isSel ? '#ede9fe' : '#f8fafc') + ';'
                    + 'border:2.5px solid ' + (isSel ? '#7c3aed' : '#e2e8f0') + ';'
                    + 'border-radius:16px;padding:14px 8px;cursor:pointer;transition:all .15s;min-height:100px;position:relative">'
                    + (isTop1 ? '<span style="position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;background:#fef9c3;color:#a16207;border-radius:6px;padding:1px 5px">추천</span>' : '')
                    + '<span style="font-size:36px;font-family:serif;font-weight:900;color:#0f172a;line-height:1.1">' + cand.h + '</span>'
                    + '<span style="font-size:12px;color:#64748b;margin-top:4px">' + cand.s + '획</span>'
                    + '<span style="font-size:12px;color:#374151;margin-top:1px">' + cand.m + '</span>'

        function _hanjaCustomInput(idx, val) {
            val = val.trim();
            var infoEl  = document.getElementById('hanja-direct-info-' + idx);
            var saveBtn = document.getElementById('hanja-save-btn-' + idx);
            if (!val) {
                _selectedHanja[idx].hanja   = null;
                _selectedHanja[idx].strokes = null;
                if (infoEl)  infoEl.textContent = '입력 후 자동 인식';
                if (saveBtn) { saveBtn.style.opacity = '.4'; saveBtn.style.pointerEvents = 'none'; }
                return;
            }
            var code    = val.charCodeAt(0);
            var isHanja = (code >= 0x4E00 && code <= 0x9FFF) || (code >= 0xF900 && code <= 0xFAFF);
            if (!isHanja) {
                if (infoEl)  infoEl.innerHTML = '<span style="color:#ef4444">한자만 입력 가능합니다</span>';
                if (saveBtn) { saveBtn.style.opacity = '.4'; saveBtn.style.pointerEvents = 'none'; }
                return;
            }
            var strokes = HANJA_STROKES[val] || null;
            var oh      = hanjaToOhaeng(val, strokes);
            _selectedHanja[idx] = { hangul: _hanjaChars[idx], hanja: val, strokes: strokes };
            if (infoEl) {
                infoEl.innerHTML = strokes
                    ? '<span style="color:#7c3aed;font-weight:700">' + val + ' · ' + (strokes ? strokes+'획 · ' : '') + (OHAENG_KR[oh]||oh) + '행</span>'
                    : '<span style="color:#f59e0b">획수 미등록 — 저장 후 후보에 추가됩니다</span>';

        }

        // ── 로컬스토리지 커스텀 한자 관리 ──
        var _CUSTOM_KEY = 'hoholo_custom_hanja';

        function _loadCustomHanja(syllable) {
            try {
                var all = JSON.parse(localStorage.getItem(_CUSTOM_KEY) || '{}');
                return all[syllable] || [];
            } catch(e) { return []; }
        }

        function _saveCustomHanja(syllable, item) {
            try {
                var all  = JSON.parse(localStorage.getItem(_CUSTOM_KEY) || '{}');
                var list = all[syllable] || [];
                // 중복 방지
                if (!list.some(function(x){ return x.h === item.h; })) {
                    list.unshift(item);   // 최신 항목을 맨 앞에
                    all[syllable] = list;
                    localStorage.setItem(_CUSTOM_KEY, JSON.stringify(all));
                }
            } catch(e) {}
        }

        function _deleteCustomHanja(syllable, hanja) {
            try {
                var all  = JSON.parse(localStorage.getItem(_CUSTOM_KEY) || '{}');
                var list = all[syllable] || [];
                all[syllable] = list.filter(function(x){ return x.h !== hanja; });
                localStorage.setItem(_CUSTOM_KEY, JSON.stringify(all));
            } catch(e) {}
        }

        function _hanjaSaveCustom(idx) {
            var sel = _selectedHanja[idx];
            if (!sel || !sel.hanja) return;
            var syl = _hanjaChars[idx];
            var inputEl = document.getElementById('hanja-direct-' + idx);
            var meaning = '';
            // 의미는 사용자가 직접 입력 못하므로 빈값으로 저장
            _saveCustomHanja(syl, { h: sel.hanja, s: sel.strokes || 0, m: '직접입력' });
            // 저장 완료 피드백
            var saveBtn = document.getElementById('hanja-save-btn-' + idx);
            if (saveBtn) {
                saveBtn.textContent = '✅ 저장됨';
                saveBtn.style.background = '#059669';
                setTimeout(function(){
                    // UI 새로고침 (저장된 목록 반영)

        function _hanjaDeleteCustom(syllable, hanja, idx) {
            _deleteCustomHanja(syllable, hanja);
            // 삭제된 항목이 현재 선택이면 선택 해제
            if (_selectedHanja[idx] && _selectedHanja[idx].hanja === hanja) {

        function hanjaSheetSkip() {

        function strokeToOhaeng(n) {
            const r = n % 10;
            if (r === 1 || r === 2) return '木';
            if (r === 3 || r === 4) return '火';
            if (r === 5 || r === 6) return '土';
            if (r === 7 || r === 8) return '金';
            return '水'; // 9, 0
        }

        // 메인 오행 판단 함수 — 부수 우선, 획수 폴백
        function hanjaToOhaeng(hanja, strokes) {
            // 1순위: 직접 매핑 테이블
            if (HANJA_OHAENG_MAP[hanja]) return HANJA_OHAENG_MAP[hanja];
            // 2순위: 획수 기반 (폴백)
            if (strokes) return strokeToOhaeng(strokes);
            return '土'; // 최후 폴백
        }

        // 한글 → 초성 추출
        function getChosung(char) {
            const code = char.charCodeAt(0) - 0xAC00;
            if (code < 0 || code > 11171) return null;
            const cho = Math.floor(code / 28 / 21);
            const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
            return CHO[cho];
        }

        // 핵심: 성명 오행 분석
        function analyzeName(hangul, hanja) {
            const result = { hangul, hanja, chars: [], total: {'木':0,'火':0,'土':0,'金':0,'水':0}, advice: [] };

            if (hanja && hanja.trim()) {
                // 한자 획수 오행 분석
                const hanjaChars = [...hanja.trim()].filter(c => c.trim());
                hanjaChars.forEach(function(ch, i) {
                    const strokes = HANJA_STROKES[ch] || null;
                    const oh = hanjaToOhaeng(ch, strokes);
                    const hangulChar = hangul ? [...hangul][i] || '' : '';
                    result.chars.push({
                        hangul: hangulChar,
                        hanja: ch,
                        strokes: strokes,
                        ohaeng: oh,
                        unknown: !strokes
                    });
                    if (oh) result.total[oh]++;
                });
            } else if (hangul && hangul.trim()) {
                // 한글 자음 오행 분석 (한자 없을 때)
                const hangulChars = [...hangul.trim()].filter(c => c.trim());
                hangulChars.forEach(function(ch) {
                    const cho = getChosung(ch);
                    const oh = cho ? (JAMO_OHAENG[cho] || '土') : null;
                    result.chars.push({
                        hangul: ch,
                        hanja: null,
                        strokes: null,
                        ohaeng: oh,
                        jamo: cho,
                        unknown: !oh
                    });
                    if (oh) result.total[oh]++;
                });
            }
            return result;
        }

        // 이름+사주 오행 궁합 분석
        function analyzeNameSaju(nameResult, sajuOhCount) {
            const nameTot = nameResult.total;
            const advices = [];

            // 사주에서 부족한 오행을 이름이 보완하는가?
            const sajuSorted = Object.entries(sajuOhCount).sort((a,b) => a[1]-b[1]);
            const sajuMin = sajuSorted[0][0]; // 사주 최소 오행
            const sajuMax = Object.entries(sajuOhCount).sort((a,b) => b[1]-a[1])[0][0]; // 사주 최다

            if (nameTot[sajuMin] > 0) {
                advices.push({ type: 'good', text: '이름에 ' + OHAENG_KR[sajuMin] + '(' + sajuMin + ') 기운이 있어 사주의 부족한 기운을 보완합니다 ✅' });
            } else {
                advices.push({ type: 'tip', text: '사주에서 ' + OHAENG_KR[sajuMin] + '(' + sajuMin + ')이 부족합니다. 개명 시 ' + sajuMin + ' 오행 한자를 포함하면 균형이 좋아집니다' });
            }

            // 이름에 사주 최다 오행이 과다하게 있는가?
            if (nameTot[sajuMax] >= 2) {
                advices.push({ type: 'warn', text: '이름과 사주 모두 ' + OHAENG_KR[sajuMax] + '(' + sajuMax + ')이 많습니다. 한쪽 오행 집중은 편중될 수 있어요' });
            }

            // 금(金) 특별 처리 — 사용자 요청
            if (sajuOhCount['金'] >= 3 || nameTot['金'] >= 2) {
                advices.push({ type: 'special', text: '금(金)이 강한 사주·이름입니다. 실생활에서 검정색(水) 아이템으로 金生水 흘려보내면 균형을 맞출 수 있어요 💡' });
            }

            return { sajuMin, sajuMax, advices };
        }

    // mbti_personalities.csv 로드 — MBTI_DATA 보강 (short_desc, core_trait, strength 등)
    (async function loadMbtiCSV() {
        try {
            var res = await fetch('data/mbti_personalities.csv');
            if (!res.ok) return;
            var text = await res.text();
            var lines = text.trim().split('\n');
            var headers = lines[0].split(',').map(function(h){ return h.trim(); });
            lines.slice(1).forEach(function(line) {
                var cols = line.split(',');
                var obj = {};
                headers.forEach(function(h, i){ obj[h] = (cols[i]||'').trim(); });
                var mbti = obj.mbti;
                if (mbti && MBTI_DATA[mbti]) {
                    // CSV 필드를 MBTI_DATA에 병합
                    MBTI_DATA[mbti].core_trait  = obj.core_trait  || MBTI_DATA[mbti].core;
                    MBTI_DATA[mbti].short_desc  = obj.short_desc  || MBTI_DATA[mbti].short;
                    MBTI_DATA[mbti].strength    = obj.strength    || '';
                    MBTI_DATA[mbti].weakness    = obj.weakness    || '';
                    MBTI_DATA[mbti].tarot_affinity = obj.tarot_affinity || '';
                }
            });
        } catch(e) { /* 폴백: 하드코딩 데이터 그대로 사용 */ }
    })();

    // 꿈 키워드 데이터

                var cols = [];

                    else { cur += line[i]; }

            };
        }
        // emoji 폴백 매핑
        var emojiMap = {'하늘':'☁️','물':'💧','불':'🔥','뱀':'🐍','돈':'💰','죽음':'🌑','비행':'✈️','시험':'📝','추락':'⬇️','결혼':'💍','학교':'🏫','집':'🏠','길':'🛤️','동물':'🐾','바다':'🌊'};

    //  타로 카드 모듈 — data/tarot_cards_78.csv 로드
    // ══════════════════════════════════════════════════

    // 타로 상태
    let tDeck = [];          // CSV에서 로드된 78장
    let tDeckLoaded = false;
    let tQuestion = '';
    let tDrawnCards = [];
    let tRevealedCount = 0;

    // 카드별 이모지 매핑
    const TAROT_EMOJI = {
      '바보':'🌟','마법사':'🪄','여사제':'🌙','여황제':'👑','황제':'🏛️',
      '교황':'⛪','연인':'💕','전차':'🏆','힘':'🦁','은둔자':'🕯️',
      '운명의 수레바퀴':'⭕','정의':'⚖️','매달린 남자':'🔄','죽음':'🌑',
      '절제':'⚗️','악마':'⛓️','탑':'⚡','별':'⭐','달':'🌕','태양':'☀️',
      '심판':'🎺','세계':'🌍',
    };
    function getTarotEmoji(nameKo, arcana, suit) {
      if(TAROT_EMOJI[nameKo]) return TAROT_EMOJI[nameKo];
      const suitEmoji = {Wands:'🔥',Cups:'💧',Swords:'⚔️',Pentacles:'🌿'};
      return suitEmoji[suit] || (arcana==='Major'?'✨':'🃏');
    }

    // CSV 파싱 (간단 구현)
    function parseTarotCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',');
      return lines.slice(1).map(line => {
        // CSV 따옴표 처리
        const cols = [];
        let cur = '', inQ = false;
        for(let i=0;i<line.length;i++){
          if(line[i]==='"'){inQ=!inQ;}
          else if(line[i]===',' && !inQ){cols.push(cur);cur='';}
          else{cur+=line[i];}
        }
        cols.push(cur);
        const obj = {};
        headers.forEach((h,i) => obj[h.trim()] = (cols[i]||'').trim());
        // 키워드를 keywords_ko 컬럼에서 가져오고 이모지 추가
        const nameKo = obj.card_name_ko || '';
        obj.emoji = getTarotEmoji(nameKo, obj.arcana, obj.suit || '');
        obj.keywords = obj.keywords_ko || '';
        return obj;
      });
    }

    // CSV 로드 (data 폴더)
    async function loadTarotDeck() {
      if(tDeckLoaded) return tDeck;
      try {
        const res = await fetch('data/tarot_cards_78.csv');
        if(!res.ok) throw new Error('CSV 로드 실패');
        const text = await res.text();
        tDeck = parseTarotCSV(text);
        tDeckLoaded = true;
        return tDeck;
      } catch(e) {
        console.warn('CSV 로드 실패, 내장 데이터 사용:', e);
        tDeck = TAROT_FALLBACK;
        tDeckLoaded = true;
        return tDeck;
      }
    }

    // 셔플
    function tShuffle(arr) {
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

      await loadTarotDeck();

    function showBtnLoading(btn, loadingText) {
        if (!btn) return;
        btn._origHTML = btn.innerHTML;
        btn._origDisabled = btn.disabled;
        btn.disabled = true;
        btn.innerHTML = '<span class="btn-spinner"></span>' + (loadingText || '처리 중...');
        btn.classList.add('btn-loading');
    }
    function hideBtnLoading(btn) {
        if (!btn || btn._origHTML === undefined) return;
        btn.innerHTML = btn._origHTML;
        btn.disabled = btn._origDisabled || false;
        btn.classList.remove('btn-loading');
        delete btn._origHTML;
        delete btn._origDisabled;
    }
