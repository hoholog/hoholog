<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파트너십 — hohologgame</title>
    <meta name="description" content="hohologgame과 함께 성장할 파트너를 찾습니다. 게임 제휴, 광고·마케팅, 콘텐츠 협업 문의를 환영합니다.">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8f9ff; color: #1e293b; }

        /* ── 히어로 그라데이션 배경 파티클 ── */
        .hero-bg {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6d28d9 100%);
            position: relative;
            overflow: hidden;
        }
        .hero-bg::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,255,255,.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,.05) 0%, transparent 40%),
                radial-gradient(circle at 60% 80%, rgba(255,255,255,.04) 0%, transparent 35%);
        }
        .hero-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── 카드 ── */
        .partner-card {
            background: #fff;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 4px 24px rgba(0,0,0,.06);
            border: 1px solid rgba(0,0,0,.05);
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .partner-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(79,70,229,.12);
        }

        /* ── 아이콘 배지 ── */
        .icon-badge {
            width: 64px; height: 64px;
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* ── 혜택 행 ── */
        .benefit-row {
            display: flex; align-items: flex-start; gap: 16px;
            background: rgba(255,255,255,.1);
            border-radius: 16px;
            padding: 20px;
        }
        .benefit-icon {
            width: 44px; height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,.18);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        /* ── FAQ ── */
        .faq-item {
            border-bottom: 1px solid #e2e8f0;
            overflow: hidden;
        }
        .faq-item:last-child { border-bottom: none; }
        .faq-q {
            width: 100%; text-align: left;
            padding: 20px 0;
            font-weight: 700; font-size: 15px; color: #1e293b;
            display: flex; justify-content: space-between; align-items: center;
            background: none; border: none; cursor: pointer;
        }
        .faq-q:hover { color: #4f46e5; }
        .faq-chevron { transition: transform .3s ease; flex-shrink: 0; }
        .faq-a {
            max-height: 0; overflow: hidden;
            transition: max-height .35s ease, padding .35s ease;
            font-size: 14px; color: #64748b; line-height: 1.8;
            padding: 0;
        }
        .faq-item.open .faq-a  { max-height: 300px; padding-bottom: 18px; }
        .faq-item.open .faq-chevron { transform: rotate(180deg); }

        /* ── 문의 폼 ── */
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Noto Sans KR', sans-serif;
            color: #1e293b;
            background: #fafafa;
            transition: border-color .2s, background .2s, box-shadow .2s;
            outline: none;
        }
        .form-input:focus {
            border-color: #4f46e5;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79,70,229,.08);
        }
        .form-label { font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 6px; display: block; }

        /* ── 섹션 페이드인 ── */
        .fade-up { opacity: 0; transform: translateY(28px); transition: opacity .55s ease, transform .55s ease; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* ── 스크롤바 ── */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }

        /* ── 스텝 넘버 ── */
        .step-num {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #4f46e5;
            color: #fff;
            font-weight: 900; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* ── 태그 ── */
        .tag { display: inline-block; background: #eef2ff; color: #4f46e5; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col">



    <!-- ── 히어로 ── -->
    <section class="hero-bg text-white py-24 px-4 fade-up visible">
        <div class="hero-grid"></div>
        <div class="max-w-3xl mx-auto text-center relative z-10">
            <span class="tag bg-white/20 text-white border border-white/30 mb-6 inline-block">🤝 Partnership</span>
            <h1 class="text-5xl md:text-6xl font-black mb-6 leading-tight tracking-tight">
                함께 성장하는<br>파트너십
            </h1>
            <p class="text-white/80 text-lg md:text-xl leading-relaxed mb-10 max-w-2xl mx-auto">
                hohologgame과 함께라면 더 많은 유저에게 닿을 수 있습니다.<br>게임 제휴부터 콘텐츠 협업까지, 다양한 방식으로 함께합니다.
            </p>
            <a href="#contact-form" class="inline-block bg-white text-indigo-700 font-black px-10 py-4 rounded-2xl text-lg hover:bg-indigo-50 transition shadow-2xl shadow-indigo-900/30">
                파트너십 문의하기 →
            </a>
        </div>
    </section>

    <main class="flex-grow max-w-6xl mx-auto w-full px-4 py-16 space-y-20">

        <!-- ── 문의 폼 ── -->
        <section class="fade-up" id="contact-form">
            <div class="text-center mb-12">
                <span class="tag mb-3 inline-block">Contact</span>
                <h2 class="text-3xl font-black text-slate-800">파트너십 문의</h2>
                <p class="text-slate-500 mt-2">영업일 기준 1~2일 내 답변 드립니다</p>
            </div>
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-100 border border-slate-50 p-8 md:p-12 max-w-2xl mx-auto">
                <form id="partnerForm" onsubmit="submitForm(event)" novalidate>
                    <div class="space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div>
                                <label class="form-label" for="f-name">이름 / 회사명 <span class="text-red-400">*</span></label>
                                <input class="form-input" id="f-name" type="text" placeholder="홍길동 / (주)예시회사" required>
                            </div>
                            <div>
                                <label class="form-label" for="f-email">이메일 <span class="text-red-400">*</span></label>
                                <input class="form-input" id="f-email" type="email" placeholder="example@email.com" required>
                            </div>
                        </div>
                        <div>
                            <label class="form-label" for="f-type">파트너십 유형 <span class="text-red-400">*</span></label>
                            <select class="form-input" id="f-type" required>
                                <option value="">선택해 주세요</option>
                                <option value="game">🎮 게임 제휴</option>
                                <option value="ad">📣 광고·마케팅</option>
                                <option value="content">✨ 콘텐츠 협업</option>
                                <option value="other">기타</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label" for="f-url">웹사이트 / 포트폴리오 URL</label>
                            <input class="form-input" id="f-url" type="url" placeholder="https://example.com">
                        </div>
                        <div>
                            <label class="form-label" for="f-msg">문의 내용 <span class="text-red-400">*</span></label>
                            <textarea class="form-input" id="f-msg" rows="5" placeholder="파트너십 목적, 원하시는 방식, 기간 등을 자유롭게 적어주세요." required style="resize:vertical;min-height:120px"></textarea>
                        </div>
                    </div>

                    <!-- 에러 메시지 -->
                    <div id="form-error" class="hidden mt-4 p-4 bg-red-50 border border-red-100 rounded-2xl text-red-600 text-sm font-medium"></div>
                    <!-- 성공 메시지 -->
                    <div id="form-success" class="hidden mt-4 p-5 bg-emerald-50 border border-emerald-100 rounded-2xl text-emerald-700 text-sm font-bold text-center">
                        ✅ 문의가 접수되었습니다! 영업일 1~2일 내로 연락드리겠습니다.
                    </div>

                    <button type="submit" id="submit-btn"
                        class="mt-6 w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                        <span id="btn-text">문의 보내기</span>
                        <span id="btn-spinner" class="hidden w-5 h-5 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
                    </button>
                    <p class="text-center text-slate-400 text-xs mt-4">제출 시 개인정보 수집에 동의하는 것으로 간주됩니다.</p>
                </form>
            </div>
        </section>

    </main>



    <script>
        // ── FAQ 토글 ──
        function toggleFaq(btn) {
            const item = btn.closest('.faq-item');
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.faq-item.open').forEach(el => el.classList.remove('open'));
            if (!isOpen) item.classList.add('open');
        }

        // ── 폼 제출 (mailto fallback) ──
        function submitForm(e) {
            e.preventDefault();
            const name  = document.getElementById('f-name').value.trim();
            const email = document.getElementById('f-email').value.trim();
            const type  = document.getElementById('f-type').value;
            const msg   = document.getElementById('f-msg').value.trim();
            const errEl = document.getElementById('form-error');
            const sucEl = document.getElementById('form-success');

            errEl.classList.add('hidden');
            sucEl.classList.add('hidden');

            if (!name || !email || !type || !msg) {
                errEl.textContent = '필수 항목(*)을 모두 입력해 주세요.';
                errEl.classList.remove('hidden');
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                errEl.textContent = '올바른 이메일 주소를 입력해 주세요.';
                errEl.classList.remove('hidden');
                return;
            }

            const btn     = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            btn.disabled = true; btnText.textContent = '전송 중...'; spinner.classList.remove('hidden');

            // mailto 방식으로 이메일 클라이언트 열기
            const typeLabel = { game:'게임 제휴', ad:'광고·마케팅', content:'콘텐츠 협업', other:'기타' }[type] || type;
            const url  = document.getElementById('f-url').value.trim();
            const body = `[파트너십 문의]\n이름/회사: ${name}\n유형: ${typeLabel}\n사이트: ${url || '미입력'}\n\n${msg}`;
            window.location.href = `mailto:hoholog@naver.com?subject=[파트너십 문의] ${name}&body=${encodeURIComponent(body)}`;

            setTimeout(() => {
                btn.disabled = false; btnText.textContent = '문의 보내기'; spinner.classList.add('hidden');
                sucEl.classList.remove('hidden');
                document.getElementById('partnerForm').reset();
            }, 1200);
        }

        // ── 스크롤 페이드인 ──
        const observer = new IntersectionObserver(entries => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    </script>
</body>
</html>
